{% extends "base.html" %}
{% block title %}Editar perfil — MitraLearn{% endblock %}

{% block content %}
<div class="section-actions">
    <div>
        <h1 class="page-title">Editar perfil</h1>
        <p class="page-subtitle">Actualiza tu información personal</p>
    </div>
    <a href="{% url 'login:profile' %}" class="btn btn-secondary">Cancelar</a>
</div>

<form method="post" class="card card-body" style="max-width: 640px;">
    {% csrf_token %}

    <div class="form-group">
        <label class="form-label" for="fullName">Nombre completo</label>
        <input class="form-control" type="text" id="fullName" name="fullName" value="{{ user.fullName }}" required>
    </div>

    <div class="form-group">
        <label class="form-label" for="career">Carrera</label>
        <input class="form-control" type="text" id="career" name="career" value="{{ user.career }}" required>
    </div>

    <div class="form-group">
        <label class="form-label" for="phone">Teléfono</label>
        <input class="form-control" type="tel" id="phone" name="phone" value="{{ user.phone }}">
    </div>

    <div class="form-group">
        <label class="form-label" for="password">Nueva contraseña</label>
        <input class="form-control" type="password" id="password" name="password" placeholder="Dejar vacío para no cambiar" minlength="6">
        <p class="text-secondary text-sm" style="margin-top: 0.35rem;">Solo completa este campo si deseas cambiar tu contraseña.</p>
    </div>

    <button type="submit" class="btn btn-primary">Guardar cambios</button>
</form>
{% endblock %}
