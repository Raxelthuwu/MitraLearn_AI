{% extends "base.html" %}
{% block title %}Crear cuenta — MitraLearn{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card" style="max-width: 480px;">

        <div class="auth-logo">
            <span class="auth-logo-mark">🎓</span>
            <h1>Crear cuenta</h1>
            <p>Únete a la comunidad MitraLearn</p>
        </div>

        <form method="post" action="{% url 'login:register' %}">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="fullName">Nombre completo</label>
                <input
                    class="input-field"
                    type="text"
                    id="fullName"
                    name="fullName"
                    placeholder="Juan Pérez"
                    autocomplete="name"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Correo electrónico</label>
                <input
                    class="input-field"
                    type="email"
                    id="email"
                    name="email"
                    placeholder="tu@correo.com"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">Teléfono</label>
                <input
                    class="input-field"
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="+57 300 000 0000"
                    autocomplete="tel"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="career">Carrera</label>
                <input
                    class="input-field"
                    type="text"
                    id="career"
                    name="career"
                    placeholder="Ingeniería de Sistemas"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="role">Rol</label>
                <select class="input-field select-field" id="role" name="role">
                    <option value="student">Estudiante</option>
                    <option value="teacher">Docente</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input
                    class="input-field"
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Mínimo 6 caracteres"
                    autocomplete="new-password"
                    minlength="6"
                    required
                >
                <p class="text-muted mt-1">La contraseña debe tener al menos 6 caracteres.</p>
            </div>

            <button type="submit" class="btn btn-primary btn--full" style="margin-top: 0.5rem;">
                Crear cuenta
            </button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes cuenta?
            <a href="{% url 'login:login' %}">Inicia sesión</a>
        </div>

    </div>
</div>
{% endblock %}
