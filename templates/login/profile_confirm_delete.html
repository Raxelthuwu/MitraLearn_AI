{% extends "base.html" %}
{% block title %}Eliminar cuenta — MitraLearn{% endblock %}

{% block content %}
<div class="card card-body" style="max-width: 560px; margin: 0 auto;">
    <h1 class="page-title" style="font-size: 1.5rem; margin-bottom: 0.75rem;">¿Eliminar tu cuenta?</h1>
    <p class="text-secondary" style="margin-bottom: 1rem;">Esta acción es permanente y no se puede deshacer.</p>
    <p style="font-weight: 600; margin-bottom: 1.5rem;">{{ user.fullName }} ({{ user.email }})</p>

    <form method="post" class="flex gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar mi cuenta</button>
        <a href="{% url 'login:profile' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
