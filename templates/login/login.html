{% extends "base.html" %}
{% block title %}Iniciar sesión — MitraLearn{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-logo">
            <span class="auth-logo-mark">🎓</span>
            <h1>MitraLearn</h1>
            <p>Inicia sesión para continuar</p>
        </div>

        <form method="post" action="{% url 'login:login' %}">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="email">Correo electrónico</label>
                <input
                    class="form-control"
                    type="email"
                    id="email"
                    name="email"
                    placeholder="tu@correo.com"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input
                    class="form-control"
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary btn--full" style="margin-top: 0.5rem;">
                Ingresar
            </button>
        </form>

        <div class="auth-footer">
            ¿No tienes cuenta?
            <a href="{% url 'login:register' %}">Regístrate aquí</a>
        </div>

    </div>
</div>
{% endblock %}
