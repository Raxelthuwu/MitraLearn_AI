{% extends "base.html" %}
{% block title %}Eliminar post — MitraLearn{% endblock %}

{% block content %}
<div class="card" style="max-width: 560px; margin: 0 auto;">
    <h1 style="font-size: 1.5rem; margin-bottom: 0.75rem;">¿Eliminar esta publicación?</h1>
    <p class="text-secondary" style="margin-bottom: 1rem;">Esta acción no se puede deshacer.</p>
    <p style="font-weight: 600; margin-bottom: 1.5rem;">{{ post.title }}</p>

    <form method="post" class="flex gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary" style="background: var(--danger); border-color: var(--danger);">Sí, eliminar</button>
        <a href="{% url 'forum:post_detail' post.id %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
