{% extends "base.html" %}
{% block title %}Edit Answer — MitraLearn{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-4">
    <h1 style="font-size: 1.75rem;">Edit Answer</h1>
    <a href="{% url 'forum:post_detail' reply.postId %}" class="btn btn-secondary">Cancel</a>
</div>

<form method="post" class="card">
    {% csrf_token %}
    <div style="display: grid; gap: 1rem;">
        <div>
            <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.4rem;">Content *</label>
            <textarea name="content" rows="8" class="input-field" style="resize: vertical;" required>{{ reply.content }}</textarea>
        </div>
        <div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
    </div>
</form>
{% endblock %}
